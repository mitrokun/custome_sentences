    HassBroadcast:
      default: "Выполнено"
    HassStartTimer:
      default: >
        {# --- Общий словарь для преобразования слов в цифры --- #}
        {% set num_map = {
            'один': 1, 'одну': 1, 'два': 2, 'две': 2, 'три': 3, 'четыре': 4,
            'пять': 5, 'шесть': 6, 'семь': 7, 'восемь': 8, 'девять': 9,
            'десять': 10, 'одиннадцать': 11, 'двенадцать': 12, 'тринадцать': 13,
            'четырнадцать': 14, 'пятнадцать': 15, 'шестнадцать': 16,
            'семнадцать': 17, 'восемнадцать': 18, 'девятнадцать': 19,
            'двадцать': 20, 'тридцать': 30, 'сорок': 40, 'пятьдесят': 50
        } %}
        
        {% set text_parts = [] %}
        
        {# --- БЛОК ЧАСОВ --- #}
        {% if slots.hours is defined and slots.hours not in ['None', None] %}
          {% set h_value = slots.hours | string %}
          {% set h_unit = 'часов' %}
          {% set h_num_val = 0 %}
          
          {# Логика преобразования текста в число (добавлено) #}
          {% if h_value.isdigit() %}
            {% set h_num_val = h_value | int %}
          {% else %}
            {% set last_word = h_value.lower().split(' ') | last %}
            {% if last_word in num_map %}
              {% set h_num_val = num_map[last_word] %}
            {% endif %}
          {% endif %}
          
          {# Склонение слова час/часа/часов #}
          {% if h_num_val % 10 == 1 and h_num_val != 11 %}
            {% set h_unit = 'час' %}
          {% elif h_num_val % 10 in [2, 3, 4] and h_num_val not in [12, 13, 14] %}
            {% set h_unit = 'часа' %}
          {% endif %}
          
          {% set text_parts = text_parts + [h_value ~ ' ' ~ h_unit] %}
        {% endif %}
        
        {# --- БЛОК МИНУТ --- #}
        {% if slots.minutes is defined and slots.minutes not in ['None', None] %}
          {% set m_value = slots.minutes | string %}
          {% set display_m_value = m_value %}
          {% set m_unit = '' %}
          {% set m_num_val = 0 %}
          
          {% if m_value.isdigit() %}
            {% set m_num_val = m_value | int %}
          {% else %}
            {% set last_word = m_value.lower().split(' ') | last %}
            {% if last_word in num_map %}
              {% set m_num_val = num_map[last_word] %}
            {% endif %}
          {% endif %}
          
          {% if m_num_val % 10 == 1 and m_num_val != 11 %}
            {% set m_unit = 'минуту' %}
          {% elif m_num_val % 10 in [2, 3, 4] and m_num_val not in [12, 13, 14] %}
            {% set m_unit = 'минуты' %}
          {% else %}
            {% set m_unit = 'минут' %}
          {% endif %}
          
          {# Подмена чисел для женского рода в винительном падеже (1->одну, 2->две) #}
          {% if m_value.isdigit() %}
            {% if m_value == '1' %}{% set display_m_value = 'одну' %}
            {% elif m_value == '2' %}{% set display_m_value = 'две' %}
            {% elif m_value == '21' %}{% set display_m_value = 'двадцать одну' %}
            {% elif m_value == '31' %}{% set display_m_value = 'тридцать одну' %}
            {% elif m_value == '41' %}{% set display_m_value = 'сорок одну' %}
            {% elif m_value == '51' %}{% set display_m_value = 'пятьдесят одну' %}
            {% elif m_value == '22' %}{% set display_m_value = 'двадцать две' %}
            {% elif m_value == '32' %}{% set display_m_value = 'тридцать две' %}
            {% elif m_value == '42' %}{% set display_m_value = 'сорок две' %}
            {% elif m_value == '52' %}{% set display_m_value = 'пятьдесят две' %}
            {% endif %}
          {% endif %}
          
          {% if m_unit %}
            {% set text_parts = text_parts + [display_m_value ~ ' ' ~ m_unit] %}
          {% endif %}
        {% endif %}
        
        {# --- БЛОК СЕКУНД --- #}
        {% if slots.seconds is defined and slots.seconds not in ['None', None] %}
          {% set s_value = slots.seconds | string %}
          {% set display_s_value = s_value %}
          {% set s_unit = '' %}
          {% set s_num_val = 0 %}
          
          {% if s_value.isdigit() %}
            {% set s_num_val = s_value | int %}
          {% else %}
            {% set last_word = s_value.lower().split(' ') | last %}
            {% if last_word in num_map %}
              {% set s_num_val = num_map[last_word] %}
            {% endif %}
          {% endif %}
          
